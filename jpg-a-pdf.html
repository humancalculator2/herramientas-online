<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Convertir JPG a PDF</title>

</head>

<body>

<h1>Convertidor JPG a PDF</h1>

<p>Sube una imagen JPG</p>

<input type="file" id="imagen" accept="image/jpeg">

<br><br>

<button onclick="convertir()">Convertir a PDF</button>

<br><br>

<a id="descargar"></a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

function convertir(){

let file=document.getElementById("imagen").files[0];

let reader=new FileReader();

reader.onload=function(e){

let { jsPDF } = window.jspdf;

let pdf=new jsPDF();

pdf.addImage(e.target.result,'JPEG',10,10,180,160);

let blob=pdf.output('blob');

let url=URL.createObjectURL(blob);

let link=document.getElementById("descargar");

link.href=url;

link.download="imagen.pdf";

link.innerHTML="Descargar PDF";

}

reader.readAsDataURL(file);

}

</script>

</body>

</html>
