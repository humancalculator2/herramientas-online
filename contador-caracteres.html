<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contador de caracteres</title>
</head>

<body>

<h1>Contador de caracteres</h1>

<textarea id="texto" rows="10" cols="40"></textarea>

<br><br>

<button onclick="contar()">Contar caracteres</button>

<p id="resultado"></p>

<script>
function contar(){
let texto=document.getElementById("texto").value;
document.getElementById("resultado").innerHTML=
"Caracteres: "+texto.length;
}
</script>

</body>
</html>
